<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>Flash Cards</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="shuffle-indicator" aria-hidden="true">
    <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor"
         stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="16 3 21 3 21 8" />
      <line x1="4" y1="20" x2="21" y2="3" />
      <polyline points="21 16 21 21 16 21" />
      <line x1="15" y1="15" x2="21" y2="21" />
      <line x1="4" y1="4" x2="9" y2="9" />
    </svg>
  </div>

  <!-- Deck picker (shown on load / refresh) -->
  <section id="deck-list" class="screen">
    <h1 class="deck-title">Decks</h1>
    <div id="deck-buttons"></div>
  </section>

  <!-- Study view -->
  <section id="study-view" class="screen" hidden>
    <header id="study-header">
      <button id="btn-decks" type="button" aria-label="Back to decks">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"
             stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6" /></svg>
        <span id="deck-name"></span>
      </button>
      <div id="side-mode" role="group" aria-label="Which side shows first">
        <button id="mode-a" class="mode-btn" type="button" aria-label="Show side A first" aria-pressed="false">A</button>
        <button id="mode-b" class="mode-btn" type="button" aria-label="Show side B first" aria-pressed="false">B</button>
        <button id="mode-random" class="mode-btn" type="button" aria-label="Show a random side first" aria-pressed="false">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="16 3 21 3 21 8" />
            <line x1="4" y1="20" x2="21" y2="3" />
            <polyline points="21 16 21 21 16 21" />
            <line x1="15" y1="15" x2="21" y2="21" />
            <line x1="4" y1="4" x2="9" y2="9" />
          </svg>
        </button>
      </div>
    </header>

    <main id="card-area">
      <div id="card-text"></div>
    </main>

    <nav id="controls">
      <button id="btn-prev" class="ctrl" type="button" aria-label="Previous card">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"
             stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6" /></svg>
      </button>
      <button id="btn-next" class="ctrl" type="button" aria-label="Reveal answer or go to next card">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"
             stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6" /></svg>
      </button>
    </nav>
  </section>

  <script src="app.js"></script>
</body>
</html>
